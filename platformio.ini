; =========================================================
; PlatformIO Project Configuration File
; Automated Provisioning Architecture
; =========================================================

[platformio]
default_envs = prod ; ডিফল্টভাবে শুধু প্রোডাকশন কোড রান হবে

; --- Base Environment (Common Settings) ---
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv  
lib_deps =
    adafruit/Adafruit BME680 Library @ ^2.0.2
    adafruit/Adafruit Unified Sensor @ ^1.1.14

; --- 1. PROVISIONING ENVIRONMENT (AT Bridge Only) ---
[env:provision]
; এই ধাপে শুধু bridge.cpp কম্পাইল হবে। main.cpp ইগনোর করা হবে।
; কোনো এনভায়রনমেন্ট ভেরিয়েবল ইনজেক্ট হবে না।
build_src_filter = -<*> +<bridge.cpp>

; --- 2. PRODUCTION ENVIRONMENT (Main IoT Firmware) ---
[env:prod]
; এই ধাপে bridge.cpp ইগনোর করে main.cpp সহ বাকি সব কম্পাইল হবে।
build_src_filter = +<*> -<bridge.cpp>
; ডায়নামিক ভেরিয়েবল ইনজেক্ট করার স্ক্রিপ্ট (apply_env.py) রান হবে
extra_scripts = pre:scripts/apply_env.py